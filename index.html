<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PONY PALACE TERMINAL</title>
    <style>
        body {
            background-color: black;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            /* Using dynamic viewport height for perfect mobile sizing */
            height: 100dvh; 
            box-sizing: border-box;
            text-shadow: 0 0 6px rgba(0, 255, 0, 0.75); 
            overflow: hidden;
        }

        /* Ambient scanline/CRT effect overlay to break up the empty space */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 2;
            background-size: 100% 4px, 6px 100%;
            pointer-events: none;
        }

        #terminal-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding-bottom: 20px;
        }

        #terminal {
            white-space: pre-wrap;
            display: inline;
            font-size: 16px;
            line-height: 1.4;
        }

        /* Responsive scaling for images */
        .terminal-img {
            width: 100%;
            max-width: 400px;
            height: auto;
            display: block;
            margin: 12px 0;
            border: 2px solid #00ff00;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            filter: grayscale(100%) brightness(1.2) contrast(1.2);
        }

        .input-line {
            display: inline-flex;
            align-items: center;
            width: 100%;
            margin-top: 5px;
        }

        .prompt {
            color: #00ff00;
            margin-right: 5px;
            font-size: 16px;
        }

        #input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        #fake-input-container {
            display: inline-flex;
            align-items: center;
            color: #00ff00;
            font-size: 16px;
        }

        #cursor {
            display: inline-block;
            color: #00ff00;
            margin-left: 1px;
            animation: blink 0.8s infinite steps(2, start);
            font-size: 16px;
        }

        @keyframes blink {
            to { visibility: hidden; }
        }

        /* Desktop media query to scale text up slightly on larger monitors */
        @media (min-width: 768px) {
            body {
                padding: 30px;
            }
            #terminal, .prompt, #fake-input-container, #cursor {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>

<div id="terminal-container">
    <div>
        <div id="terminal"></div>
        <span class="input-line">
            <span class="prompt" id="prompt-char"></span>
            <span id="fake-input-container"><span id="fake-text"></span><span id="cursor">_</span></span>
        </span>
    </div>
</div>

<input id="input" autocomplete="off" autofocus>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
// FIREBASE CONFIGURATION
const firebaseConfig = {
    apiKey: "AIzaSyAwGfqHi429gD7nWwYGpDTJu_HD8VH2TTw",
    authDomain: "pony-palace-5a579.firebaseapp.com",
    databaseURL: "https://pony-palace-5a579-default-rtdb.firebaseio.com",
    projectId: "pony-palace-5a579",
    storageBucket: "pony-palace-5a579.firebasestorage.app",
    messagingSenderId: "343906921946",
    appId: "1:343906921946:web:87848ca367fca0800a64e3"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();
const chatRef = database.ref("messages");

const terminal = document.getElementById("terminal");
const container = document.getElementById("terminal-container");
const input = document.getElementById("input");
const fakeText = document.getElementById("fake-text");
const promptChar = document.getElementById("prompt-char");
const cursor = document.getElementById("cursor");

document.addEventListener("click", () => {
    input.focus();
    if (currentStep === "AWAITING_TAP") {
        triggerPasswordPrompt();
    }
});

let currentStep = "HOLD"; 
let currentUser = "UNKNOWN";
const SECRET_PASSWORD = "k11w22e5b2"; 
let isInitialLoad = true;

cursor.style.display = "none";

function bootTerminalSequence() {
    chatRef.once("value", (snapshot) => {
        let msgCount = 0;
        if (snapshot.exists()) {
            msgCount = snapshot.numChildren();
        }

        const sessionTime = localStorage.getItem("pony_palace_session");
        const twoHours = 2 * 60 * 60 * 1000;

        if (sessionTime && (Date.now() - sessionTime < twoHours)) {
            cursor.style.display = "inline-block"; 
            typeText("SESSION VALIDATED.\nENTER OPERATOR HANDLE:\n", 30, () => {
                currentStep = "USERNAME";
            });
            return;
        }
        
        localStorage.removeItem("pony_palace_session");

        if (msgCount > 0) {
            let welcomeText = `[ALERT]: ${msgCount} NEW MESSAGE(S).\n\n`;
            typeText(welcomeText, 25, () => {
                currentStep = "AWAITING_TAP"; 
            });
        } else {
            typePasswordPrompt();
        }
    });
}

function triggerPasswordPrompt() {
    currentStep = "HOLD";
    terminal.innerHTML = ""; 
    setTimeout(() => {
        typePasswordPrompt();
    }, 1000);
}

function typePasswordPrompt() {
    typeText("Pony Palace Secret Password (k11w22e5b2):\n", 25, () => {
        cursor.style.display = "inline-block"; 
        currentStep = "PASSWORD";
    });
}

bootTerminalSequence();
promptChar.innerHTML = "";

input.addEventListener("input", () => {
    if (currentStep !== "HOLD" && currentStep !== "AWAITING_TAP") {
        fakeText.innerText = input.value;
    }
});

function typeText(text, speed, callback) {
    let i = 0;
    function worker() {
        if (i < text.length) {
            terminal.innerHTML += text.charAt(i);
            i++;
            scrollToBottom();
            setTimeout(worker, speed);
        } else if (callback) {
            callback();
        }
    }
    worker();
}

function isImageURL(text) {
    return (text.match(/\.(jpeg|jpg|gif|png)$/) != null) || text.startsWith("data:image");
}

let printQueue = [];
let isPrinting = false;

function processPrintQueue() {
    if (printQueue.length === 0) {
        isPrinting = false;
        return;
    }
    isPrinting = true;
    const nextMsg = printQueue.shift();

    if (isImageURL(nextMsg.text)) {
        let metaText = `[${nextMsg.timestamp}] ${nextMsg.user}: sent an image:\n`;
        typeText(metaText, 20, () => {
            terminal.innerHTML += `<img class="terminal-img" src="${nextMsg.text}" alt="Terminal Payload">\n\n`;
            scrollToBottom();
            processPrintQueue();
        });
    } else {
        let fullLine = `[${nextMsg.timestamp}] ${nextMsg.user}: ${nextMsg.text}\n\n`;
        typeText(fullLine, 15, () => {
            processPrintQueue();
        });
    }
}

chatRef.on("child_added", (snapshot) => {
    if (currentStep === "CHAT") {
        const data = snapshot.val();
        
        if (isInitialLoad) {
            if (isImageURL(data.text)) {
                terminal.innerHTML += `[${data.timestamp}] ${data.user}: sent an image:\n<img class="terminal-img" src="${data.text}">\n\n`;
            } else {
                terminal.innerHTML += `[${data.timestamp}] ${data.user}: ${data.text}\n\n`;
            }
            scrollToBottom();
        } else {
            printQueue.push(data);
            if (!isPrinting) processPrintQueue();
        }
    }
});

document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === "visible") {
        if (printQueue.length > 0 && !isPrinting) {
            processPrintQueue();
        }
    }
});

chatRef.on("value", (snapshot) => {
    if (currentStep === "CHAT" && !snapshot.exists()) {
        terminal.innerHTML = ""; 
        printQueue = [];
        scrollToBottom();
    }
});

input.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        let val = input.value.trim();
        input.value = ""; 
        fakeText.innerText = ""; 

        if (currentStep === "HOLD" || currentStep === "AWAITING_TAP") return;
        if (val === "") return;

        if (val === "/clearall" && currentStep === "CHAT") {
            if (currentUser === "?") {
                chatRef.set(null); 
            } else {
                let now = new Date();
                let timeStr = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit', hour12: false});
                chatRef.push({
                    user: currentUser,
                    text: "tried to clear the logs but isn't an admin.",
                    timestamp: timeStr
                });
            }
            return;
        }

        if (currentStep === "PASSWORD") {
            if (val === SECRET_PASSWORD) {
                localStorage.setItem("pony_palace_session", Date.now());

                terminal.innerHTML = "";
                promptChar.innerHTML = "";
                currentStep = "HOLD";
                
                setTimeout(() => {
                    typeText("ENTER OPERATOR HANDLE:\n", 30, () => {
                        currentStep = "USERNAME";
                    });
                }, 1000); 
            } else {
                currentStep = "HOLD";
                typeText("ACCESS DENIED.\nTRY AGAIN:\n", 20, () => {
                    currentStep = "PASSWORD";
                });
            }
            return;
        }

        if (currentStep === "USERNAME") {
            currentUser = val.toUpperCase();
            terminal.innerHTML = "";
            promptChar.innerHTML = "";
            currentStep = "HOLD";

            setTimeout(() => {
                promptChar.innerHTML = "&gt; ";
                currentStep = "CHAT";
                
                chatRef.once("value", (snapshot) => {
                    terminal.innerHTML = ""; 
                    snapshot.forEach((childSnapshot) => {
                        const data = childSnapshot.val();
                        if (isImageURL(data.text)) {
                            terminal.innerHTML += `[${data.timestamp}] ${data.user}: sent an image:\n<img class="terminal-img" src="${data.text}">\n\n`;
                        } else {
                            terminal.innerHTML += `[${data.timestamp}] ${data.user}: ${data.text}\n\n`;
                        }
                    });
                    scrollToBottom();
                    isInitialLoad = false; 
                });

            }, 1000); 
            return;
        }

        if (currentStep === "CHAT") {
            let now = new Date();
            let timeStr = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit', hour12: false});

            chatRef.push({
                user: currentUser,
                text: val,
                timestamp: timeStr
            });
        }
    }
});

function scrollToBottom() {
    container.scrollTop = container.scrollHeight;
}
</script>

</body>
</html>
