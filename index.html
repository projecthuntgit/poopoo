<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PONY PALACE TERMINAL</title>
    <style>
        body {
            background-color: black;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 95vh;
            text-shadow: 0 0 5px #00ff00; 
            overflow: hidden;
        }

        #terminal-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
        }

        #terminal {
            white-space: pre-wrap;
            display: inline;
        }

        .input-line {
            display: inline-flex;
            align-items: center;
            width: 100%;
        }

        .prompt {
            color: #00ff00;
            margin-right: 5px;
        }

        #input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        #fake-input-container {
            display: inline-flex;
            align-items: center;
            color: #00ff00;
            font-size: 16px;
        }

        /* Fixed underscore cursor styling */
        #cursor {
            display: inline-block;
            color: #00ff00;
            margin-left: 1px;
            animation: blink 0.8s infinite steps(2, start);
            text-shadow: 0 0 5px #00ff00;
        }

        @keyframes blink {
            to { visibility: hidden; }
        }
    </style>
</head>
<body>

<div id="terminal-container">
    <div>
        <div id="terminal"></div>
        <span class="input-line">
            <span class="prompt" id="prompt-char"></span>
            <span id="fake-input-container"><span id="fake-text"></span><span id="cursor">_</span></span>
        </span>
    </div>
</div>

<input id="input" autocomplete="off" autofocus>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
// FIREBASE CONFIGURATION
const firebaseConfig = {
    apiKey: "AIzaSyAwGfqHi429gD7nWwYGpDTJu_HD8VH2TTw",
    authDomain: "pony-palace-5a579.firebaseapp.com",
    databaseURL: "https://pony-palace-5a579-default-rtdb.firebaseio.com",
    projectId: "pony-palace-5a579",
    storageBucket: "pony-palace-5a579.firebasestorage.app",
    messagingSenderId: "343906921946",
    appId: "1:343906921946:web:87848ca367fca0800a64e3"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();
const chatRef = database.ref("messages");

const terminal = document.getElementById("terminal");
const container = document.getElementById("terminal-container");
const input = document.getElementById("input");
const fakeText = document.getElementById("fake-text");
const promptChar = document.getElementById("prompt-char");

document.addEventListener("click", () => input.focus());

// --- TERMINAL STATE MACHINE ---
let currentStep = "PASSWORD"; 
let currentUser = "UNKNOWN";
const SECRET_PASSWORD = "k11w22e5b2"; 

// Initial prompt line config
terminal.innerHTML = "Pony Palace Secret Password (k11w22e5b2):\n";
promptChar.innerHTML = "";

input.addEventListener("input", () => {
    fakeText.innerText = input.value;
});

// LISTEN FOR DATABASE MESSAGES
chatRef.on("child_added", (snapshot) => {
    if (currentStep === "CHAT") {
        const data = snapshot.val();
        terminal.innerHTML += `[${data.timestamp}] ${data.user}: ${data.text}\n\n`;
        scrollToBottom();
    }
});

// LISTEN FOR WIPE COMMANDS FROM OTHER SESSIONS
chatRef.on("value", (snapshot) => {
    if (currentStep === "CHAT" && !snapshot.exists()) {
        terminal.innerHTML = ""; // Clean wipe, no text banner
        scrollToBottom();
    }
});

// INTERCEPT ENTRY
input.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        let val = input.value.trim();
        input.value = ""; 
        fakeText.innerText = ""; 

        if (val === "" && currentStep !== "HOLD") return;

        // ADMIN CLEAR COMMAND
        if (val === "/clearall" && currentStep === "CHAT") {
            chatRef.set(null); 
            return;
        }

        // STEP 1: PASSWORD CHECK
        if (currentStep === "PASSWORD") {
            if (val === SECRET_PASSWORD) {
                // Clear page to absolute blankness for processing simulation
                terminal.innerHTML = "";
                promptChar.innerHTML = "";
                currentStep = "HOLD"; // Freeze input interactions during processing
                
                setTimeout(() => {
                    terminal.innerHTML = "ENTER OPERATOR HANDLE:\n";
                    currentStep = "USERNAME";
                }, 1500); // 1.5 second wait delay
            } else {
                terminal.innerHTML += "ACCESS DENIED.\nTRY AGAIN:\n";
            }
            scrollToBottom();
            return;
        }

        // STEP 2: ASSIGN USERNAME
        if (currentStep === "USERNAME") {
            currentUser = val.toUpperCase();
            // Clear page to absolute blankness again
            terminal.innerHTML = "";
            promptChar.innerHTML = "";
            currentStep = "HOLD";

            setTimeout(() => {
                promptChar.innerHTML = "&gt; ";
                currentStep = "CHAT";
                loadChatHistory();
            }, 1500); // 1.5 second wait delay
            return;
        }

        // STEP 3: REGULAR CHAT FUNCTION
        if (currentStep === "CHAT") {
            let now = new Date();
            let timeStr = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit', hour12: false});

            chatRef.push({
                user: currentUser,
                text: val,
                timestamp: timeStr
            });
        }
    }
});

function loadChatHistory() {
    chatRef.once("value", (snapshot) => {
        terminal.innerHTML = ""; // Keeps it raw and clean
        snapshot.forEach((childSnapshot) => {
            const data = childSnapshot.val();
            terminal.innerHTML += `[${data.timestamp}] ${data.user}: ${data.text}\n\n`;
        });
        scrollToBottom();
    });
}

function scrollToBottom() {
    container.scrollTop = container.scrollHeight;
}
</script>

</body>
</html>
