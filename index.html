<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WATCHMAN TERMINAL</title>
    <style>
        body {
            background-color: black;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 95vh;
            text-shadow: 0 0 5px #00ff00; 
        }

        #terminal-container {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 10px;
        }

        #terminal {
            white-space: pre-wrap;
        }

        .input-line {
            display: flex;
            align-items: center;
        }

        .prompt {
            color: #00ff00;
            margin-right: 10px;
        }

        #input {
            background: black;
            color: #00ff00;
            border: none;
            outline: none;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            flex: 1;
            text-shadow: 0 0 5px #00ff00;
        }
    </style>
</head>
<body>

<div id="terminal-container">
    <div id="terminal">WATCHMAN TERMINAL v0.3&#10;Connecting to network...&#10;&#10;</div>
</div>

<div class="input-line">
    <span class="prompt">&gt;</span>
    <input id="input" autocomplete="off" autofocus>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
// YOUR FIXED FIREBASE CONFIGURATION
const firebaseConfig = {
    apiKey: "AIzaSyAwGfqHi429gD7nWwYGpDTJu_HD8VH2TTw",
    authDomain: "pony-palace-5a579.firebaseapp.com",
    databaseURL: "https://pony-palace-5a579-default-rtdb.firebaseio.com",
    projectId: "pony-palace-5a579",
    storageBucket: "pony-palace-5a579.firebasestorage.app",
    messagingSenderId: "343906921946",
    appId: "1:343906921946:web:87848ca367fca0800a64e3"
};

// Initialize Firebase using web-ready scripts
firebase.initializeApp(firebaseConfig);
const database = firebase.database();
const chatRef = database.ref("messages");

const terminal = document.getElementById("terminal");
const container = document.getElementById("terminal-container");
const input = document.getElementById("input");

// Keep input focused when clicking anywhere on screen
document.addEventListener("click", () => input.focus());

// LISTEN FOR NEW MESSAGES (Runs instantly when a message hits Firebase)
chatRef.on("child_added", (snapshot) => {
    const data = snapshot.val();
    
    // Print the message to the terminal screen
    terminal.innerHTML += `[${data.timestamp}] ${data.user}: ${data.text}\n\n`;
    scrollToBottom();
});

// CAPTURE AND SEND MESSAGE
input.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        let messageText = input.value.trim();
        if (messageText === "") return;

        // Create a basic timestamp
        let now = new Date();
        let timeStr = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit', hour12: false});

        // Send straight to your Firebase Realtime Database
        chatRef.push({
            user: "WATCHMAN",
            text: messageText,
            timestamp: timeStr
        });

        input.value = "";
    }
});

function scrollToBottom() {
    container.scrollTop = container.scrollHeight;
}
</script>

</body>
</html>
