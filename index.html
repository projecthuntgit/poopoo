<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PONY PALACE TERMINAL</title>
    <style>
        body {
            background-color: black;
            color: #00ff00;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 95vh;
            text-shadow: 0 0 5px #00ff00; 
        }

        #terminal-container {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 20px;
            padding-right: 10px;
        }

        #terminal {
            white-space: pre-wrap;
        }

        .input-line {
            display: flex;
            align-items: center;
        }

        .prompt {
            color: #00ff00;
            margin-right: 10px;
        }

        #input {
            background: black;
            color: #00ff00;
            border: none;
            outline: none;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            flex: 1;
            text-shadow: 0 0 5px #00ff00;
        }
    </style>
</head>
<body>

<div id="terminal-container">
    <div id="terminal"></div>
</div>

<div class="input-line">
    <span class="prompt" id="prompt-char">&gt;</span>
    <input id="input" autocomplete="off" autofocus>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
// FIREBASE CONFIGURATION
const firebaseConfig = {
    apiKey: "AIzaSyAwGfqHi429gD7nWwYGpDTJu_HD8VH2TTw",
    authDomain: "pony-palace-5a579.firebaseapp.com",
    databaseURL: "https://pony-palace-5a579-default-rtdb.firebaseio.com",
    projectId: "pony-palace-5a579",
    storageBucket: "pony-palace-5a579.firebasestorage.app",
    messagingSenderId: "343906921946",
    appId: "1:343906921946:web:87848ca367fca0800a64e3"
};

firebase.initializeApp(firebaseConfig);
const database = firebase.database();
const chatRef = database.ref("messages");

const terminal = document.getElementById("terminal");
const container = document.getElementById("terminal-container");
const input = document.getElementById("input");
const promptChar = document.getElementById("prompt-char");

// Keep input focused
document.addEventListener("click", () => input.focus());

// --- TERMINAL STATE MACHINE ---
let currentStep = "PASSWORD"; 
let currentUser = "UNKNOWN";
const SECRET_PASSWORD = "k11w22e5b2"; // 👈 CHANGE YOUR ACTUAL SECRET PASSWORD HERE!

// Rebranded initialization text
terminal.innerHTML = "Pony Palace Secret Password:";
promptChar.innerHTML = "KEY:";

// LISTEN FOR DATABASE MESSAGES
chatRef.on("child_added", (snapshot) => {
    if (currentStep === "CHAT") {
        const data = snapshot.val();
        terminal.innerHTML += `[${data.timestamp}] ${data.user}: ${data.text}\n\n`;
        scrollToBottom();
    }
});

// INTERCEPT ENTRY
input.addEventListener("keydown", function(event) {
    if (event.key === "Enter") {
        let val = input.value.trim();
        input.value = ""; 

        if (val === "") return;

        // STEP 1: PASSWORD CHECK
        if (currentStep === "PASSWORD") {
            if (val === SECRET_PASSWORD) {
                terminal.innerHTML += "ACCESS GRANTED.\n\nINITIALIZING OPERATOR PROTOCOL...\nENTER OPERATOR HANDLE:\n";
                promptChar.innerHTML = "NAME:";
                currentStep = "USERNAME";
            } else {
                terminal.innerHTML += "ACCESS DENIED.\nINVALID KEY. TRY AGAIN:\n";
            }
            scrollToBottom();
            return;
        }

        // STEP 2: ASSIGN USERNAME
        if (currentStep === "USERNAME") {
            currentUser = val.toUpperCase();
            terminal.innerHTML = `DECRYPTING PALACE ARCHIVES... Welcome, ${currentUser}.\n\n--- PONY PALACE ONLINE ---\n\n`;
            promptChar.innerHTML = "&gt;";
            currentStep = "CHAT";
            
            loadChatHistory();
            return;
        }

        // STEP 3: REGULAR CHAT FUNCTION
        if (currentStep === "CHAT") {
            let now = new Date();
            let timeStr = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit', hour12: false});

            chatRef.push({
                user: currentUser,
                text: val,
                timestamp: timeStr
            });
        }
    }
});

function loadChatHistory() {
    chatRef.once("value", (snapshot) => {
        terminal.innerHTML = `--- CONSOLE LOG ARCHIVE ---\n\n`;
        snapshot.forEach((childSnapshot) => {
            const data = childSnapshot.val();
            terminal.innerHTML += `[${data.timestamp}] ${data.user}: ${data.text}\n\n`;
        });
        scrollToBottom();
    });
}

function scrollToBottom() {
    container.scrollTop = container.scrollHeight;
}
</script>

</body>
</html>
